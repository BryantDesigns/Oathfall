name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run GUT tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Read pinned Godot version
        id: godot
        run: echo "version=$(cat GODOT_VERSION | cut -d. -f1-3)" >> $GITHUB_OUTPUT

      - name: Set up Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ steps.godot.outputs.version }}
          use-dotnet: false

      - name: Import project
        run: godot --headless --import || true

      - name: Run unit tests
        run: |
          godot --headless --path . \
            -s res://addons/gut/gut_cmdln.gd \
            -gdir=res://tests/unit \
            -gexit

      - name: Run smoke test
        run: |
          godot --headless --path . \
            -s res://addons/gut/gut_cmdln.gd \
            -gdir=res://tests/smoke \
            -gexit

  build-linux:
    name: Build Linux export
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Read pinned Godot version
        id: godot
        run: echo "version=$(cat GODOT_VERSION | cut -d. -f1-3)" >> $GITHUB_OUTPUT

      - name: Set up Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ steps.godot.outputs.version }}
          use-dotnet: false

      - name: Install export templates
        run: godot --headless --install-export-templates || true

      - name: Import project
        run: godot --headless --import || true

      - name: Build Linux export
        run: |
          mkdir -p build/linux
          godot --headless --path . --export-debug "Linux/X11" build/linux/oathfall.x86_64 || \
            godot --headless --path . --export-debug "Linux" build/linux/oathfall.x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: oathfall-linux-debug
          path: build/linux/
          retention-days: 7
